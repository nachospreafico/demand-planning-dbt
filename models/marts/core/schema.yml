version: 2

models:
  - name: dim_date
    description: Calendar dimension derived from Retail Rocket event timestamps.

    columns:
      - name: date
        tests:
          - unique
          - not_null

  - name: dim_product
    description: Product dimension built from Retail Rocket item properties.

    columns:
      - name: product_id
        tests:
          - unique
          - not_null
